<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <!-- Restored Original Geometry with High-Contrast Finish -->
  
  <!-- Central Core: Premium Gold (#C9A34E) -->
  <circle cx="50" cy="50" r="10" fill="#C9A34E" />
  
  <!-- Inner Ring: Precise White Structure -->
  <circle cx="50" cy="50" r="21" stroke="#FFFFFF" stroke-width="1.6" vector-effect="non-scaling-stroke" />
  
  <!-- Middle Ring: Precise White Structure -->
  <circle cx="50" cy="50" r="32" stroke="#FFFFFF" stroke-width="2.3" vector-effect="non-scaling-stroke" />
  
  <!-- Outer Arc Structure: White Segment -->
  <path 
    d="M 87.5 32.5 A 44 44 0 1 1 83 23" 
    stroke="#FFFFFF" 
    stroke-width="5" 
    stroke-linecap="round" 
    vector-effect="non-scaling-stroke"
  />
  
  <!-- Subtle Gold Accent on Outer Arc (approx 15%) -->
  <path 
    d="M 83 23 A 44 44 0 0 1 93 40" 
    stroke="#C9A34E" 
    stroke-width="5" 
    stroke-linecap="round" 
    vector-effect="non-scaling-stroke"
  />
</svg>
